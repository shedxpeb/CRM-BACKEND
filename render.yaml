# Render Blueprint — change host later without changing application code.
# Only environment variables differ between Render / Hostinger / AWS / etc.
services:
  - type: web
    name: peb-crm-api
    runtime: node
    plan: starter
    region: oregon
    # CRITICAL: always generate Prisma Client before tsc/nest build
    buildCommand: npm ci && npx prisma generate && npm run architecture:validate && npm run type-check && npm run build
    startCommand: node scripts/deploy-db.mjs && node dist/main.js
    healthCheckPath: /live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_IP_FAMILY
        value: "4"
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: SMTP_GREETING_TIMEOUT_MS
        value: "10000"
      - key: SMTP_SOCKET_TIMEOUT_MS
        value: "15000"
      - key: SMTP_DNS_TIMEOUT_MS
        value: "5000"
      - key: SMTP_VERIFY_ON_BOOT
        value: "true"
      - key: SMTP_REQUIRED
        value: "true"
      - key: BRAND_COMPANY_NAME
        sync: false
      - key: BRAND_SUPPORT_EMAIL
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: SESSION_ABSOLUTE_DAYS
        value: "1"
      - key: SESSION_REMEMBER_ME_DAYS
        value: "30"
      - key: THROTTLE_LIMIT
        value: "60"
      - key: HEALTH_HEAP_MB
        value: "1024"
      - key: HEALTH_RSS_MB
        value: "1536"